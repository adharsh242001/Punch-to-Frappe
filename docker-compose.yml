services:
  postgres:
    image: postgres:16-alpine
    container_name: punch-sync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: punch_sync
      POSTGRES_USER: punch_sync
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_postgres_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U punch_sync -d punch_sync"]
      interval: 10s
      timeout: 5s
      retries: 5

  punch-sync-server:
    image: codeaceitsolutionsllp/punch-to-frappe:latest
    container_name: punch-sync-server
    restart: unless-stopped
    user: "10001:10001"
    env_file:
      - .env.server
    ports:
      # Dashboard + edge ingest endpoint: http://<host>:8080/
      - "8080:8080"
    volumes:
      - ./employee_map.json:/app/employee_map.json:ro
      # Mount .env.server as /app/.env so the dashboard "Configuration" tab can
      # persist edits back to the host file. Restart the container to apply.
      # Must be writable by uid 10001 inside the container.
      - ./.env.server:/app/.env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json,urllib.request; print(json.load(urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5))['ok'])",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
