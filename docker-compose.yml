services:
  postgres:
    image: postgres:16-alpine
    container_name: punch-sync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: punch_sync
      POSTGRES_USER: punch_sync
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_postgres_password}
    volumes:
       - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U punch_sync -d punch_sync"]
      interval: 10s
      timeout: 5s
      retries: 5

  punch-sync-server:
    image: codeaceitsolutionsllp/punch-to-frappe:latest
    container_name: punch-sync-server
    restart: unless-stopped
    user: "10001:10001"
    group_add:
      # Set DOCKER_GID on the host if this default does not match:
      # DOCKER_GID=$(getent group docker | cut -d: -f3) docker compose up -d
      - "${DOCKER_GID:-998}"
    env_file:
      - .env.server
    expose:
      - "8080"
    volumes:
      # Writable so the dashboard Employee Map tab can persist mapping edits.
      # Must be writable by uid 10001 inside the container.
      - ./employee_map.json:/app/employee_map.json
      # Mount .env.server as /app/.env so the dashboard "Configuration" tab can
      # persist edits back to the host file. Restart the container to apply.
      # Must be writable by uid 10001 inside the container.
      - ./.env.server:/app/.env
      # Optional: allows the dashboard to restart this container after saving
      # employee_map.json when EMPLOYEE_MAP_RESTART_COMMAND is configured.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json,urllib.request; print(json.load(urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5))['ok'])",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  hrms-attendance:
    image: codeaceitsolutionsllp/hrms-attendance:latest
    container_name: hrms-attendance
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://punch_sync:${POSTGRES_PASSWORD:-change_this_postgres_password}@postgres:5432/punch_sync
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      # Kept for backward compatibility with .env.local that may reference
      # host.docker.internal:8090. Inside this compose you can also point
      # HRMS env vars directly at http://punch-sync-server:8080 or http://nginx:8090.
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  nginx:
    image: nginx:1.27-alpine
    container_name: punch-sync-nginx
    restart: unless-stopped
    env_file:
      - .env.server
    ports:
      # Public dashboard + edge ingest endpoint: http://<host>:8090/
      - "${DASHBOARD_PORT:-8090}:8090"
      # HRMS Attendance (attendance.codeace.org) - HTTP redirect + HTTPS
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Let's Encrypt certs (managed on the host by certbot) - read-only
      - /etc/letsencrypt:/etc/letsencrypt:ro
    command:
      - sh
      - -c
      - |
        USERNAME="$${NGINX_BASIC_AUTH_USER:-admin}"
        PASSWORD="$${NGINX_BASIC_AUTH_PASSWORD:-change_this_dashboard_password}"
        if [ -z "$${USERNAME}" ] || [ -z "$${PASSWORD}" ]; then
          echo "NGINX_BASIC_AUTH_USER and NGINX_BASIC_AUTH_PASSWORD must not be empty" >&2
          exit 1
        fi
        printf '%s:{PLAIN}%s\n' "$${USERNAME}" "$${PASSWORD}" > /etc/nginx/.htpasswd
        nginx -g 'daemon off;'
    depends_on:
      punch-sync-server:
        condition: service_healthy
      hrms-attendance:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/health >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    external: true
    name: root_postgres_data
