version: 1
name: product-team-agents
description: Specialist subagent catalog for product strategy, design, engineering, launch, growth, support, finance, and orchestration.
coordination_rules:
  - Choose the smallest useful team for the user's goal.
  - Give each selected subagent a clear deliverable, boundary, and decision authority.
  - Merge outputs into one prioritized plan.
  - Route final cross-functional tradeoffs through the Founder / Orchestrator Agent.
subagents:
